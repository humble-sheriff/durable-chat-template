<!doctype html>
<html lang="en">
	<head>
		<!-- Basic Page Needs
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
		<meta charset="utf-8" />
		<title>Chat!</title>
		<meta name="description" content="" />
		<meta name="author" content="" />

		<!-- Mobile Specific Metas
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- FONT
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

		<!-- CSS
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
		<link rel="stylesheet" href="css/normalize.css" />
		<link rel="stylesheet" href="css/skeleton.css" />
		<link rel="stylesheet" href="styles.css" />

		<!-- Favicon
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
		<link rel="icon" type="image/ico" href="favicon.ico" />
		<script src="/dist/index.js" type="module"></script>
	</head>
	<body>
		<!-- Primary Page Layout
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
		<div class="terminal-wrapper">
			<div class="scanline"></div>
			<div class="background-accents">
				<div class="accent-circle-green"></div>
			</div>
			<div class="corner top-left"></div>
			<div class="corner top-right"></div>
			<div class="corner bottom-left"></div>
			<div class="corner bottom-right"></div>
			
			<div class="container main-layout">
				<div class="row">
					<div class="one-third column description-panel">
						<div class="panel-content">
							<h4 class="retro-title"><b>TACTICAL CHAT</b></h4>
							<p class="retro-subtitle">POWERED BY DURABLE OBJECTS</p>
							<div class="divider"></div>
							<p class="description-text">
								Real-time synchronization across edge locations.
								Each room is a persistent state instance.
							</p>
							<div class="match-timer">LIVE: 90:00+</div>
							<div class="pitch-container">
								<div class="goal-box goal-top"></div>
								<div class="goal-box goal-bottom"></div>
							</div>
							<div class="stats-panel">
								<div class="status-item">
									<span class="status-dot"></span>
									<span class="status-label">ENCRYPTION: ACTIVE</span>
								</div>
								<div class="status-item">
									<span class="status-dot" style="background: var(--kenya-red); box-shadow: 0 0 6px var(--kenya-red);"></span>
									<span class="status-label">MATCH STATUS: KICKOFF</span>
								</div>
							</div>
						</div>
					</div>
					<div class="two-thirds column chat-panel" id="root"></div>
				</div>
			</div>
		</div>

		<!-- End Document
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
	</body>
</html>
